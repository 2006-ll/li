<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未来穿越机</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 40%, #2d1b69 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .container {
    position: relative; z-index: 1;
    width: 420px; background: rgba(20, 20, 60, 0.85);
    border: 2px solid rgba(120, 100, 255, 0.4);
    border-radius: 24px; padding: 40px 36px;
    box-shadow: 0 0 60px rgba(100, 80, 255, 0.3), 0 0 120px rgba(80, 60, 200, 0.15);
    backdrop-filter: blur(10px);
    text-align: center;
  }
  .title {
    font-size: 28px; font-weight: bold;
    background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 13px; color: rgba(180, 170, 240, 0.7);
    margin-bottom: 32px;
  }
  .section-label {
    font-size: 14px; color: #b0a8e0;
    margin-bottom: 12px; text-align: left;
  }
  .time-options {
    display: flex; gap: 10px; margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .time-btn {
    flex: 1; min-width: 70px;
    padding: 10px 8px;
    background: rgba(40, 30, 80, 0.7);
    border: 1.5px solid rgba(140, 120, 240, 0.5);
    border-radius: 12px; color: #d4c8ff;
    font-size: 14px; cursor: pointer;
    transition: all 0.25s;
  }
  .time-btn:hover {
    border-color: #a78bfa; background: rgba(80, 60, 160, 0.5);
  }
  .time-btn.selected {
    border-color: #818cf8; background: rgba(99, 102, 241, 0.4);
    box-shadow: 0 0 16px rgba(129, 140, 248, 0.4);
    color: #fff; font-weight: bold;
  }
  .time-btn.custom { font-size: 12px; }
  .custom-input-wrap {
    display: none; margin-top: -16px; margin-bottom: 28px;
  }
  .custom-input-wrap.show { display: flex; gap: 8px; align-items: center; }
  .custom-input-wrap input {
    flex: 1; padding: 10px 14px;
    background: rgba(30, 20, 60, 0.8);
    border: 1.5px solid rgba(140, 120, 240, 0.5);
    border-radius: 10px; color: #fff; font-size: 14px;
    outline: none;
  }
  .custom-input-wrap input:focus { border-color: #818cf8; }
  .custom-input-wrap span { color: #b0a8e0; font-size: 14px; white-space: nowrap; }
  .btn-launch {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #7c3aed, #6366f1);
    border: none; border-radius: 14px;
    color: #fff; font-size: 18px; font-weight: bold;
    cursor: pointer; letter-spacing: 2px;
    transition: all 0.3s;
    box-shadow: 0 4px 24px rgba(124, 58, 237, 0.4);
    margin-bottom: 12px;
  }
  .btn-launch:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 32px rgba(124, 58, 237, 0.6);
  }
  .btn-launch:active { transform: scale(0.97); }

  /* 加载界面 */
  .loading-overlay {
    display: none; position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(5, 5, 20, 0.92);
    z-index: 100;
    align-items: center; justify-content: center;
    flex-direction: column;
  }
  .loading-card {
    background: rgba(20, 20, 60, 0.9);
    border: 2px solid rgba(120, 100, 255, 0.3);
    border-radius: 24px; padding: 44px 40px 36px;
    text-align: center;
    box-shadow: 0 0 80px rgba(100, 80, 255, 0.3);
    width: 400px;
  }
  .loading-title {
    font-size: 22px; font-weight: bold;
    color: #c4b5fd; margin-bottom: 28px;
  }
  /* 横条进度条 */
  .progress-bar-wrap {
    width: 100%; height: 14px;
    background: rgba(60, 50, 120, 0.5);
    border-radius: 7px; overflow: hidden;
    margin-bottom: 10px;
  }
  .progress-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #7c3aed, #a78bfa, #60a5fa, #34d399);
    background-size: 300% 100%;
    animation: shimmer 2s linear infinite;
    border-radius: 7px;
    transition: width 0.3s linear;
  }
  @keyframes shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: 0 0; }
  }
  .progress-pct {
    text-align: right; font-size: 13px; color: #a5b4fc;
    margin-bottom: 20px;
  }
  .loading-msg {
    color: #a5b4fc; font-size: 14px;
    margin-bottom: 4px; line-height: 1.8;
  }
  .loading-warn {
    color: #fbbf24; font-size: 12px;
    margin-bottom: 28px;
  }
  .btn-cancel, .btn-vip {
    padding: 10px 28px; border-radius: 12px;
    font-size: 14px; cursor: pointer;
    transition: all 0.25s;
  }
  .btn-cancel {
    background: transparent; border: 1px solid rgba(200, 180, 240, 0.4);
    color: #b0a8e0;
  }
  .btn-cancel:hover { border-color: #ef4444; color: #ef4444; }
  .btn-vip {
    background: linear-gradient(135deg, #f59e0b, #f97316);
    border: none; color: #fff; font-weight: bold;
    margin-left: 12px;
    box-shadow: 0 2px 12px rgba(245, 158, 11, 0.4);
  }
  .btn-vip:hover { box-shadow: 0 4px 20px rgba(245, 158, 11, 0.6); transform: translateY(-1px); }
  .btn-vip:active { transform: scale(0.96); }

  /* VIP失败Toast */
  .vip-toast {
    display: none; position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 300;
    align-items: center; justify-content: center;
  }
  .vip-toast-bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(5, 5, 20, 0.6);
  }
  .vip-toast-card {
    position: relative;
    background: rgba(30, 20, 60, 0.95);
    border: 2px solid rgba(239, 68, 68, 0.5);
    border-radius: 20px; padding: 36px 40px;
    text-align: center;
    box-shadow: 0 0 50px rgba(239, 68, 68, 0.3);
    animation: popIn 0.35s ease-out;
  }
  .vip-toast-icon { font-size: 48px; margin-bottom: 12px; }
  .vip-toast-title {
    font-size: 20px; font-weight: bold; color: #f87171;
    margin-bottom: 6px;
  }
  .vip-toast-msg {
    font-size: 14px; color: #c4b5fd; margin-bottom: 24px;
  }
  .vip-toast-btns {
    display: flex; gap: 10px; justify-content: center;
  }
  .vip-toast-btn {
    padding: 10px 22px;
    border-radius: 10px;
    font-size: 14px; cursor: pointer;
    transition: all 0.2s;
  }
  .vip-toast-btn.secondary {
    background: transparent;
    border: 1px solid rgba(200, 180, 240, 0.4);
    color: #b0a8e0;
  }
  .vip-toast-btn.secondary:hover {
    border-color: #a78bfa; color: #c4b5fd;
  }
  .vip-toast-btn.primary {
    background: linear-gradient(135deg, #f59e0b, #f97316);
    border: none; color: #fff; font-weight: bold;
    box-shadow: 0 2px 12px rgba(245, 158, 11, 0.4);
  }
  .vip-toast-btn.primary:hover {
    box-shadow: 0 4px 20px rgba(245, 158, 11, 0.6); transform: translateY(-1px);
  }
  .vip-toast-close .vip-toast-btn {
    background: linear-gradient(135deg, #7c3aed, #6366f1);
    border: none; color: #fff; font-weight: bold;
    padding: 10px 36px;
  }

  /* 成功弹窗 */
  .success-modal {
    display: none; position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(5, 5, 20, 0.85);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  .success-card {
    background: rgba(20, 20, 60, 0.95);
    border: 2px solid rgba(52, 211, 153, 0.5);
    border-radius: 24px; padding: 48px 40px;
    text-align: center;
    box-shadow: 0 0 60px rgba(52, 211, 153, 0.3);
    animation: popIn 0.4s ease-out;
  }
  @keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .success-icon { font-size: 56px; margin-bottom: 16px; }
  .success-title {
    font-size: 24px; font-weight: bold;
    color: #34d399; margin-bottom: 8px;
  }
  .success-msg {
    color: #a5b4fc; font-size: 15px;
    margin-bottom: 28px; line-height: 1.6;
  }
  .btn-back {
    padding: 10px 36px;
    background: linear-gradient(135deg, #7c3aed, #6366f1);
    border: none; border-radius: 12px;
    color: #fff; font-size: 15px; font-weight: bold;
    cursor: pointer;
  }

  /* 粒子 */
  .particle {
    position: fixed; pointer-events: none;
    width: 3px; height: 3px;
    background: #a78bfa; border-radius: 50%;
    animation: floatUp 3s ease-out forwards;
    z-index: 90;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-200px) scale(0.3); }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- 主界面 -->
<div class="container" id="mainPanel">
  <div class="title">未来穿越机</div>
  <div class="subtitle">即刻启程</div>

  <div class="section-label">请选择您需要穿越的时间</div>
  <div class="time-options">
    <button class="time-btn" data-time="3">3秒后</button>
    <button class="time-btn selected" data-time="5">5秒后</button>
    <button class="time-btn" data-time="10">10秒后</button>
    <button class="time-btn" data-time="60">1分钟后</button>
    <button class="time-btn custom" data-time="custom">自定义</button>
  </div>

  <div class="custom-input-wrap" id="customInputWrap">
    <input type="number" id="customSeconds" placeholder="输入秒数" min="1" value="30">
    <span>秒后</span>
  </div>

  <button class="btn-launch" onclick="startTravel()">立即开始穿越</button>
</div>

<!-- 加载界面 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-card">
    <div class="loading-title">穿越加载中</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-pct" id="progressPct">0%</div>
    <div class="loading-msg" id="loadingMsg">预计还有 5 秒穿越准备中</div>
    <div class="loading-msg">请耐心等待，期间请勿断电，否则会失败。</div>
    <div class="loading-warn">⚠ 穿越中途退出可能导致时空紊乱</div>
    <div style="margin-top: 4px;">
      <button class="btn-cancel" onclick="cancelTravel()">取消穿越</button>
      <button class="btn-vip" onclick="vipSkip()">充值VIP跳过</button>
    </div>
  </div>
</div>

<!-- VIP弹窗 -->
<div class="vip-toast" id="vipToast">
  <div class="vip-toast-bg"></div>
  <div class="vip-toast-card">
    <div class="vip-toast-icon" id="vipToastIcon">👖</div>
    <div class="vip-toast-title" id="vipToastTitle">充值失败</div>
    <div class="vip-toast-msg" id="vipToastMsg">检测裤兜没钱</div>
    <div class="vip-toast-btns" id="vipToastBtns">
      <button class="vip-toast-btn secondary" onclick="closeVipToast()">返回上一步</button>
      <button class="vip-toast-btn primary" onclick="confirmVipPay()">我真的有钱，充值</button>
    </div>
    <div class="vip-toast-close" id="vipToastClose" style="display:none;">
      <button class="vip-toast-btn" onclick="closeVipToast()">知道了</button>
    </div>
  </div>
</div>

<!-- 成功弹窗 -->
<div class="success-modal" id="successModal">
  <div class="success-card">
    <div class="success-icon">🌀</div>
    <div class="success-title">穿越成功！</div>
    <div class="success-msg" id="successMsg">
      您已抵达 2026年7月4日 的未来世界<br>
      当前时刻比出发时前进了 5 秒
    </div>
    <button class="btn-back" onclick="goBack()">回到现在</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let selectedSeconds = 5;
let countdownTimer = null;
let startTime = null;
let totalSeconds = 5;
let elapsed = 0;          // 已过毫秒
let tickMs = 1000;        // 每次 tick 间隔，VIP充值后变为 200ms
let vipActive = false;    // 是否已开启VIP极速模式
let totalMs = 5000;       // 总时长毫秒

// 时间选项
document.querySelectorAll('.time-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
    this.classList.add('selected');
    if (this.dataset.time === 'custom') {
      $('customInputWrap').classList.add('show');
      selectedSeconds = parseInt($('customSeconds').value) || 30;
    } else {
      $('customInputWrap').classList.remove('show');
      selectedSeconds = parseInt(this.dataset.time);
    }
  });
});
$('customSeconds').addEventListener('input', function() {
  selectedSeconds = Math.max(1, parseInt(this.value) || 1);
});

// 星空
(function() {
  const s = $('stars');
  for (let i = 0; i < 120; i++) {
    const d = document.createElement('div');
    Object.assign(d.style, {
      position:'absolute',
      width: (Math.random()*2.5+1)+'px',
      height: (Math.random()*2.5+1)+'px',
      background: `rgba(255,255,255,${Math.random()*0.7+0.3})`,
      borderRadius:'50%',
      left: Math.random()*100+'%',
      top: Math.random()*100+'%',
      animation: `twinkle ${Math.random()*3+2}s ease-in-out infinite`,
      animationDelay: Math.random()*3+'s'
    });
    s.appendChild(d);
  }
  const st = document.createElement('style');
  st.textContent = '@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}';
  document.head.appendChild(st);
})();

// 粒子
function spawnParticles(n) {
  const colors = ['#a78bfa','#60a5fa','#34d399','#fbbf24'];
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    Object.assign(p.style, {
      left: (30+Math.random()*40)+'%',
      top: (40+Math.random()*20)+'%',
      animationDuration: (1.5+Math.random()*2)+'s',
      animationDelay: Math.random()*.5+'s',
      background: colors[Math.floor(Math.random()*4)]
    });
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3000);
  }
}

// 进度条
function updateProgress() {
  const pct = Math.min(100, (elapsed / totalMs) * 100);
  const pctStr = vipActive ? pct.toFixed(2) : Math.round(pct).toString();
  $('progressFill').style.width = pct + '%';
  $('progressPct').textContent = pctStr + '%';
}

// 更新加载提示文字
function updateLoadingMsg() {
  const remainMs = totalMs - elapsed;
  if (remainMs <= 0) return;
  if (vipActive) {
    const remainSec = (remainMs / 1000).toFixed(1);
    $('loadingMsg').textContent = `预计还有 ${remainSec} 秒穿越准备中（极速模式）`;
  } else {
    const remainSec = Math.ceil(remainMs / 1000);
    $('loadingMsg').textContent = `预计还有 ${remainSec} 秒穿越准备中`;
  }
}

// 穿越成功
function showSuccess() {
  const now = new Date();
  const future = new Date(now.getTime() + totalMs);
  const diff = startTime ? ((now - startTime)/1000).toFixed(1) : (totalMs/1000).toFixed(1);
  const dateStr = future.toLocaleString('zh-CN', {
    year:'numeric', month:'long', day:'numeric',
    hour:'2-digit', minute:'2-digit', second:'2-digit'
  });
  $('loadingOverlay').style.display = 'none';
  $('successMsg').innerHTML =
    `您已抵达 <strong>${dateStr}</strong> 的未来世界`;
  $('successModal').style.display = 'flex';
  spawnParticles(30);
}

function doTick() {
  elapsed += tickMs;
  updateProgress();
  if (elapsed >= totalMs) {
    clearInterval(countdownTimer);
    countdownTimer = null;
    showSuccess();
    return;
  }
  updateLoadingMsg();
  if (vipActive) {
    spawnParticles(1);
  } else {
    if (elapsed % 1000 === 0) spawnParticles(3);
  }
}

function startCountdown() {
  countdownTimer = setInterval(doTick, tickMs);
}

function startTravel() {
  totalSeconds = selectedSeconds;
  totalMs = totalSeconds * 1000;
  elapsed = 0;
  tickMs = 1000;
  vipActive = false;
  startTime = new Date();

  $('loadingOverlay').style.display = 'flex';
  $('successModal').style.display = 'none';
  updateProgress();
  updateLoadingMsg();
  spawnParticles(20);

  startCountdown();
}

function cancelTravel() {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  $('loadingOverlay').style.display = 'none';
}

function vipSkip() {
  // 不暂停倒计时，直接弹窗
  resetVipToast();
  $('vipToast').style.display = 'flex';
}

function resetVipToast() {
  $('vipToastIcon').textContent = '👖';
  $('vipToastTitle').textContent = '充值失败';
  $('vipToastTitle').style.color = '#f87171';
  $('vipToastMsg').textContent = '检测裤兜没钱';
  $('vipToastBtns').style.display = 'flex';
  $('vipToastClose').style.display = 'none';
}

function closeVipToast() {
  $('vipToast').style.display = 'none';
}

function confirmVipPay() {
  // 切换为充值成功 UI
  $('vipToastIcon').textContent = '💰';
  $('vipToastTitle').textContent = '充值成功';
  $('vipToastTitle').style.color = '#34d399';
  $('vipToastMsg').textContent = '已开启极速穿越模式';
  $('vipToastBtns').style.display = 'none';
  $('vipToastClose').style.display = 'block';

  // 不关闭弹窗，让用户点"知道了"
  // 但后台已经把倒计时切换为极速模式
  if (!vipActive) {
    vipActive = true;
    tickMs = 200; // 每 0.2 秒 tick 一次
    if (countdownTimer) {
      clearInterval(countdownTimer);
      startCountdown();
    }
    updateLoadingMsg();
    spawnParticles(15);
  }
}

function goBack() {
  $('successModal').style.display = 'none';
}
</script>
</body>
</html>
